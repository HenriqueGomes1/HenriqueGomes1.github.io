<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimório — Organizador de RPG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======================= HOME ======================= -->
<section id="view-home" class="view view-home active">
  <div class="seam"></div>

  <button class="half half-player" data-goto="player">
    <div class="half-inner">
      <span class="half-rune">⚔</span>
      <h2 class="half-title">Jogador</h2>
      <p class="half-sub">Monte sua ficha de personagem</p>
      <span class="half-cta">Entrar como Jogador →</span>
    </div>
  </button>

  <button class="half half-master" data-goto="master">
    <div class="half-inner">
      <span class="half-rune">☾</span>
      <h2 class="half-title">Mestre</h2>
      <p class="half-sub">Crie NPCs e monstros</p>
      <span class="half-cta">Entrar como Mestre →</span>
    </div>
  </button>

  <div class="home-brand">
    <span class="brand-mark">Grimório</span>
    <span class="brand-tag">um caderno de mestre &amp; jogador</span>
  </div>
</section>

<!-- ======================= PLAYER ======================= -->
<section id="view-player" class="view view-player">
  <header class="app-header header-player">
    <button class="btn-back" data-goto="home">← Voltar</button>
    <h1>Ficha de Personagem <span class="edition-tag">SRD 5.5</span></h1>
    <div class="header-actions">
      <select id="player-select"><option value="">— nova ficha —</option></select>
      <button id="player-new" class="btn-ghost">+ Nova ficha</button>
      <button id="player-delete" class="btn-danger">Excluir</button>
    </div>
  </header>

  <div class="sheet-wrap">
    <!-- Top identity strip -->
    <div class="card identity-strip">
      <label class="field"><span>Nome do Personagem</span>
        <input type="text" id="p-name" placeholder="Ex: Elenya Ventoclaro"></label>
      <label class="field"><span>Classe</span>
        <input type="text" id="p-class" placeholder="Ex: Bruxo"></label>
      <label class="field"><span>Nível</span>
        <input type="number" id="p-level" min="1" max="20" value="1"></label>
      <label class="field"><span>Linhagem / Espécie</span>
        <input type="text" id="p-species" placeholder="Ex: Tiefling"></label>
      <label class="field"><span>Antecedente</span>
        <input type="text" id="p-background" placeholder="Ex: Eremita"></label>
      <label class="field"><span>Alinhamento</span>
        <input type="text" id="p-alignment" placeholder="Ex: Neutro e Bom"></label>
    </div>

    <div class="sheet-grid">
      <!-- Ability scores -->
      <div class="card abilities-card">
        <h3>Atributos</h3>
        <div class="abilities-grid" id="abilities-grid"></div>
      </div>

      <!-- Combat stats -->
      <div class="card combat-card">
        <h3>Combate</h3>
        <div class="combat-grid">
          <label class="stat-box"><span>CA</span><input type="number" id="p-ac" value="10"></label>
          <label class="stat-box"><span>Iniciativa</span><input type="number" id="p-init" value="0"></label>
          <label class="stat-box"><span>Deslocamento</span><input type="text" id="p-speed" value="9m"></label>
          <label class="stat-box wide"><span>PV Atual</span><input type="number" id="p-hp-current" value="10"></label>
          <label class="stat-box wide"><span>PV Máximo</span><input type="number" id="p-hp-max" value="10"></label>
          <label class="stat-box wide"><span>Dado de Vida</span><input type="text" id="p-hitdice" placeholder="Ex: 1d8"></label>
          <label class="stat-box"><span>Bônus Proficiência</span><input type="text" id="p-prof" value="+2" readonly></label>
          <label class="stat-box"><span>Inspiração</span>
            <input type="checkbox" id="p-inspiration" class="checkbox-lg"></label>
        </div>
      </div>

      <!-- Saving throws -->
      <div class="card saves-card">
        <h3>Salvaguardas</h3>
        <div id="saves-grid" class="saves-grid"></div>
      </div>

      <!-- Skills -->
      <div class="card skills-card">
        <h3>Perícias</h3>
        <div id="skills-grid" class="skills-grid"></div>
      </div>

      <!-- Equipment & Notes -->
      <div class="card equip-card">
        <h3>Equipamento</h3>
        <textarea id="p-equipment" placeholder="Armas, armaduras, itens, moedas..."></textarea>
      </div>

      <div class="card traits-card">
        <h3>Características &amp; Talentos</h3>
        <textarea id="p-traits" placeholder="Traços de classe, talentos, feitiços conhecidos..."></textarea>
      </div>

      <div class="card personality-card">
        <h3>Personalidade</h3>
        <div class="personality-grid">
          <label class="field"><span>Traços de Personalidade</span><textarea id="p-ptraits"></textarea></label>
          <label class="field"><span>Ideais</span><textarea id="p-ideals"></textarea></label>
          <label class="field"><span>Vínculos</span><textarea id="p-bonds"></textarea></label>
          <label class="field"><span>Defeitos</span><textarea id="p-flaws"></textarea></label>
        </div>
      </div>
    </div>
  </div>
  <div class="save-indicator" id="player-save-indicator">Salvo ✓</div>
</section>

<!-- ======================= MASTER ======================= -->
<section id="view-master" class="view view-master">
  <header class="app-header header-master">
    <button class="btn-back" data-goto="home">← Voltar</button>
    <h1>Caderno do Mestre</h1>
    <div class="tab-switch">
      <button class="tab-btn active" data-tab="npc">NPCs</button>
      <button class="tab-btn" data-tab="monster">Monstros</button>
    </div>
  </header>

  <!-- NPC TAB -->
  <div class="master-panel" id="panel-npc">
    <div class="panel-cols">
      <div class="card form-card">
        <h3>Novo NPC</h3>
        <label class="field"><span>Nome</span><input type="text" id="npc-name" placeholder="Ex: Barnabé, o taverneiro"></label>
        <div class="field-row">
          <label class="field"><span>Raça / Ocupação</span><input type="text" id="npc-race" placeholder="Ex: Humano, comerciante"></label>
          <label class="field"><span>Local</span><input type="text" id="npc-location" placeholder="Ex: Taverna do Javali Dourado"></label>
        </div>
        <label class="field"><span>Atitude</span>
          <select id="npc-attitude">
            <option>Amigável</option>
            <option>Neutro</option>
            <option>Hostil</option>
            <option>Desconhecido</option>
          </select>
        </label>
        <label class="field"><span>Aparência</span><textarea id="npc-appearance" placeholder="Como o NPC se parece..."></textarea></label>
        <label class="field"><span>Personalidade &amp; Motivações</span><textarea id="npc-personality" placeholder="Maneirismos, objetivos, segredos..."></textarea></label>
        <label class="field"><span>Notas do Mestre</span><textarea id="npc-notes" placeholder="Ganchos de aventura, relações, informações úteis..."></textarea></label>
        <div class="form-actions">
          <button id="npc-save" class="btn-primary btn-master">Salvar NPC</button>
          <button id="npc-clear" class="btn-ghost">Limpar</button>
        </div>
      </div>

      <div class="list-card">
        <div class="list-header">
          <h3>NPCs Criados</h3>
          <input type="search" id="npc-search" placeholder="Buscar NPC...">
        </div>
        <div id="npc-list" class="entity-list"></div>
      </div>
    </div>
  </div>

  <!-- MONSTER TAB -->
  <div class="master-panel" id="panel-monster" hidden>
    <div class="panel-cols">
      <div class="card form-card">
        <h3>Novo Monstro</h3>
        <label class="field"><span>Nome</span><input type="text" id="mon-name" placeholder="Ex: Lobo Sombrio"></label>
        <div class="field-row">
          <label class="field"><span>Tipo</span><input type="text" id="mon-type" placeholder="Ex: Fera média"></label>
          <label class="field"><span>ND (Desafio)</span><input type="text" id="mon-cr" placeholder="Ex: 1/2"></label>
        </div>
        <div class="field-row">
          <label class="field"><span>CA</span><input type="number" id="mon-ac" value="12"></label>
          <label class="field"><span>PV</span><input type="text" id="mon-hp" placeholder="Ex: 11 (2d8+2)"></label>
          <label class="field"><span>Deslocamento</span><input type="text" id="mon-speed" value="12m"></label>
        </div>
        <div class="abilities-grid" id="mon-abilities-grid"></div>
        <label class="field"><span>Ações</span><textarea id="mon-actions" placeholder="Mordida: +4 para acertar, 1d6+2 de dano perfurante..."></textarea></label>
        <label class="field"><span>Traços Especiais</span><textarea id="mon-traits" placeholder="Sentidos, resistências, habilidades passivas..."></textarea></label>
        <label class="field"><span>Notas do Mestre</span><textarea id="mon-notes" placeholder="Onde usar, táticas, variações..."></textarea></label>
        <div class="form-actions">
          <button id="mon-save" class="btn-primary btn-master">Salvar Monstro</button>
          <button id="mon-clear" class="btn-ghost">Limpar</button>
        </div>
      </div>

      <div class="list-card">
        <div class="list-header">
          <h3>Bestiário</h3>
          <input type="search" id="mon-search" placeholder="Buscar monstro...">
        </div>
        <div id="mon-list" class="entity-list"></div>
      </div>
    </div>
  </div>
</section>

<!-- Detail modal for viewing NPC/monster -->
<div id="detail-modal" class="modal" hidden>
  <div class="modal-card">
    <button class="modal-close" id="modal-close">✕</button>
    <div id="modal-body"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>

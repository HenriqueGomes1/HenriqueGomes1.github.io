<svg viewBox="0 0 1340 1020" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="triangle" markerWidth="16" markerHeight="14" refX="14" refY="7" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L14,7 L0,14 Z" fill="white" stroke="#1e293b" stroke-width="1.3"/>
    </marker>
    <marker id="diamond" markerWidth="18" markerHeight="12" refX="0" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,6 L9,0 L18,6 L9,12 Z" fill="#1e293b"/>
    </marker>
    <marker id="openarrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,6 L0,12" fill="none" stroke="#64748b" stroke-width="1.4"/>
    </marker>
    <filter id="softshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#1e293b" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1340" height="1020" fill="#ffffff"/>

  <!-- ===================== TITULO ===================== -->
  <text x="670" y="35" text-anchor="middle" font-size="23" font-weight="700" fill="#1e293b">Diagrama de Classes UML — RPG Master</text>
  <text x="670" y="57" text-anchor="middle" font-size="12.5" fill="#64748b">Heranca: Criatura → Personagem / Npc &#160;&#160;·&#160;&#160; Composicao: Campanha ◆ Personagem/Npc, Personagem ◆ Habilidade &#160;&#160;·&#160;&#160; Dependencia: enums</text>

  <!-- ===================== CONECTORES (atras das caixas) ===================== -->
  <!-- Heranca: Personagem -> Criatura -->
  <path d="M140,530 L560,358" fill="none" stroke="#1e293b" stroke-width="1.6" marker-end="url(#triangle)"/>
  <!-- Heranca: Npc -> Criatura -->
  <path d="M750,530 L700,358" fill="none" stroke="#1e293b" stroke-width="1.6" marker-end="url(#triangle)"/>

  <!-- Composicao: Campanha -> Npc -->
  <path d="M970,295 L970,400 L900,400 L900,530" fill="none" stroke="#1e293b" stroke-width="1.6" marker-start="url(#diamond)"/>
  <!-- Composicao: Campanha -> Personagem -->
  <path d="M1050,295 L1050,430 L300,430 L300,530" fill="none" stroke="#1e293b" stroke-width="1.6" marker-start="url(#diamond)"/>
  <!-- Composicao: Personagem -> Habilidade -->
  <path d="M150,633 L150,710" fill="none" stroke="#1e293b" stroke-width="1.6" marker-start="url(#diamond)"/>

  <!-- Dependencia: Personagem -> ClasseRPG -->
  <path d="M380,580 L430,580" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#openarrow)"/>
  <!-- Dependencia: Npc -> TipoNpc -->
  <path d="M980,575 L1030,575" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#openarrow)"/>
  <!-- Dependencia: Habilidade -> Atributo -->
  <path d="M380,765 L430,765" fill="none" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#openarrow)"/>

  <!-- Multiplicidades -->
  <text x="974" y="312" font-size="11" fill="#475569">1</text>
  <text x="906" y="525" font-size="11" fill="#475569">0..*</text>
  <text x="1054" y="312" font-size="11" fill="#475569">1</text>
  <text x="262" y="525" font-size="11" fill="#475569">0..*</text>
  <text x="158" y="648" font-size="11" fill="#475569">1</text>
  <text x="158" y="705" font-size="11" fill="#475569">0..*</text>

  <!-- ===================== CRIATURA (abstract) ===================== -->
  <g filter="url(#softshadow)">
    <rect x="480" y="90" width="340" height="268" rx="7" fill="#ffffff" stroke="#334155" stroke-width="1.6"/>
    <rect x="480" y="90" width="340" height="44" rx="7" fill="#334155"/>
    <rect x="480" y="120" width="340" height="14" fill="#334155"/>
  </g>
  <text x="650" y="106" text-anchor="middle" font-size="10.5" font-style="italic" fill="#cbd5e1">«abstract»</text>
  <text x="650" y="124" text-anchor="middle" font-size="16" font-weight="700" font-style="italic" fill="#ffffff">Criatura</text>
  <g font-family="'Consolas','Courier New',monospace" font-size="12" fill="#1e293b">
    <text x="494" y="150">- id: Long</text>
    <text x="494" y="167">- nome: String</text>
    <text x="494" y="184">- forca: int</text>
    <text x="494" y="201">- destreza: int</text>
    <text x="494" y="218">- constituicao: int</text>
    <text x="494" y="235">- inteligencia: int</text>
    <text x="494" y="252">- sabedoria: int</text>
    <text x="494" y="269">- carisma: int</text>
    <text x="494" y="286">- descricao: String</text>
  </g>
  <line x1="480" y1="296" x2="820" y2="296" stroke="#cbd5e1" stroke-width="1"/>
  <g font-family="'Consolas','Courier New',monospace" font-size="12" fill="#1e293b">
    <text x="494" y="312">+ calcularBonus(valor: int): int  «static»</text>
    <text x="494" y="329">+ getBonus&lt;Atributo&gt;(): int    (6 métodos)</text>
    <text x="494" y="346">+ getValorAtributo(atributo: Atributo): int</text>
  </g>

  <!-- ===================== CAMPANHA (lado Mestre) ===================== -->
  <g filter="url(#softshadow)">
    <rect x="900" y="90" width="320" height="205" rx="7" fill="#f6f1fb" stroke="#6b3fa0" stroke-width="1.6"/>
    <rect x="900" y="90" width="320" height="32" rx="7" fill="#6b3fa0"/>
    <rect x="900" y="110" width="320" height="12" fill="#6b3fa0"/>
  </g>
  <text x="1060" y="112" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Campanha</text>
  <g font-family="'Consolas','Courier New',monospace" font-size="12" fill="#1e293b">
    <text x="914" y="138">- id: Long</text>
    <text x="914" y="155">- nome: String</text>
    <text x="914" y="172">- mestre: String</text>
    <text x="914" y="189">- descricao: String</text>
    <text x="914" y="206">- dataCriacao: LocalDate</text>
  </g>
  <line x1="900" y1="216" x2="1220" y2="216" stroke="#d8c7ec" stroke-width="1"/>
  <g font-family="'Consolas','Courier New',monospace" font-size="11.5" fill="#1e293b">
    <text x="914" y="232">+ adicionarPersonagem(p: Personagem): void</text>
    <text x="914" y="249">+ adicionarNpc(n: Npc): void</text>
    <text x="914" y="266">+ getTotalPersonagens(): int</text>
    <text x="914" y="283">+ getTotalNpcs(): int</text>
  </g>

  <!-- ===================== PERSONAGEM (lado Jogador) ===================== -->
  <g filter="url(#softshadow)">
    <rect x="60" y="530" width="320" height="103" rx="7" fill="#eef8f1" stroke="#2f7d52" stroke-width="1.6"/>
    <rect x="60" y="530" width="320" height="32" rx="7" fill="#2f7d52"/>
    <rect x="60" y="550" width="320" height="12" fill="#2f7d52"/>
  </g>
  <text x="220" y="552" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Personagem</text>
  <g font-family="'Consolas','Courier New',monospace" font-size="12" fill="#1e293b">
    <text x="74" y="578">- classe: ClasseRPG</text>
    <text x="74" y="595">- nivel: int</text>
  </g>
  <line x1="60" y1="605" x2="380" y2="605" stroke="#cfe9d9" stroke-width="1"/>
  <text x="74" y="621" font-family="'Consolas','Courier New',monospace" font-size="11.5" fill="#1e293b">+ adicionarHabilidade(h: Habilidade): void</text>

  <!-- ===================== NPC (lado Mestre) ===================== -->
  <g filter="url(#softshadow)">
    <rect x="680" y="530" width="300" height="111" rx="7" fill="#f6f1fb" stroke="#6b3fa0" stroke-width="1.6"/>
    <rect x="680" y="530" width="300" height="32" rx="7" fill="#6b3fa0"/>
    <rect x="680" y="550" width="300" height="12" fill="#6b3fa0"/>
  </g>
  <text x="830" y="552" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Npc</text>
  <g font-family="'Consolas','Courier New',monospace" font-size="12" fill="#1e293b">
    <text x="694" y="578">- tipo: TipoNpc</text>
    <text x="694" y="595">- nivelDesafio: String</text>
    <text x="694" y="612">- pontosVida: int</text>
    <text x="694" y="629">- geradoPorIa: boolean</text>
  </g>

  <!-- ===================== HABILIDADE (lado Jogador) ===================== -->
  <g filter="url(#softshadow)">
    <rect x="60" y="710" width="320" height="128" rx="7" fill="#eef8f1" stroke="#2f7d52" stroke-width="1.6"/>
    <rect x="60" y="710" width="320" height="32" rx="7" fill="#2f7d52"/>
    <rect x="60" y="730" width="320" height="12" fill="#2f7d52"/>
  </g>
  <text x="220" y="732" text-anchor="middle" font-size="16" font-weight="700" fill="#ffffff">Habilidade</text>
  <g font-family="'Consolas','Courier New',monospace" font-size="12" fill="#1e293b">
    <text x="74" y="758">- id: Long</text>
    <text x="74" y="775">- nome: String</text>
    <text x="74" y="792">- descricao: String</text>
    <text x="74" y="809">- atributoChave: Atributo</text>
    <text x="74" y="826">- tipoEfeito: String</text>
  </g>

  <!-- ===================== ENUM ClasseRPG ===================== -->
  <g filter="url(#softshadow)">
    <rect x="430" y="530" width="220" height="106" rx="7" fill="#fdf8ec" stroke="#b8860b" stroke-width="1.4" stroke-dasharray="0"/>
    <rect x="430" y="530" width="220" height="44" rx="7" fill="#b8860b"/>
    <rect x="430" y="560" width="220" height="14" fill="#b8860b"/>
  </g>
  <text x="540" y="546" text-anchor="middle" font-size="10.5" font-style="italic" fill="#fcefc7">«enumeration»</text>
  <text x="540" y="564" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">ClasseRPG</text>
  <g font-family="'Consolas','Courier New',monospace" font-size="10.3" fill="#1e293b" text-anchor="middle">
    <text x="540" y="590">GUERREIRO · MAGO · LADINO · CLERIGO</text>
    <text x="540" y="607">BARBARO · BARDO · PALADINO · PATRULHEIRO</text>
    <text x="540" y="624">FEITICEIRO · BRUXO · MONGE · DRUIDA</text>
  </g>

  <!-- ===================== ENUM TipoNpc ===================== -->
  <g filter="url(#softshadow)">
    <rect x="1030" y="530" width="220" height="89" rx="7" fill="#fdf8ec" stroke="#b8860b" stroke-width="1.4"/>
    <rect x="1030" y="530" width="220" height="44" rx="7" fill="#b8860b"/>
    <rect x="1030" y="560" width="220" height="14" fill="#b8860b"/>
  </g>
  <text x="1140" y="546" text-anchor="middle" font-size="10.5" font-style="italic" fill="#fcefc7">«enumeration»</text>
  <text x="1140" y="564" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">TipoNpc</text>
  <g font-family="'Consolas','Courier New',monospace" font-size="10.3" fill="#1e293b" text-anchor="middle">
    <text x="1140" y="590">ALIADO · NEUTRO</text>
    <text x="1140" y="607">VILAO · MONSTRO</text>
  </g>

  <!-- ===================== ENUM Atributo ===================== -->
  <g filter="url(#softshadow)">
    <rect x="430" y="710" width="260" height="89" rx="7" fill="#fdf8ec" stroke="#b8860b" stroke-width="1.4"/>
    <rect x="430" y="710" width="260" height="44" rx="7" fill="#b8860b"/>
    <rect x="430" y="740" width="260" height="14" fill="#b8860b"/>
  </g>
  <text x="560" y="726" text-anchor="middle" font-size="10.5" font-style="italic" fill="#fcefc7">«enumeration»</text>
  <text x="560" y="744" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Atributo</text>
  <g font-family="'Consolas','Courier New',monospace" font-size="10.3" fill="#1e293b" text-anchor="middle">
    <text x="560" y="770">FORCA · DESTREZA · CONSTITUICAO</text>
    <text x="560" y="787">INTELIGENCIA · SABEDORIA · CARISMA</text>
  </g>

  <!-- ===================== LEGENDA ===================== -->
  <g font-size="12" fill="#334155">
    <line x1="60" y1="900" x2="110" y2="900" stroke="#1e293b" stroke-width="1.6" marker-end="url(#triangle)"/>
    <text x="120" y="904">Heranca (extends)</text>

    <line x1="320" y1="900" x2="370" y2="900" stroke="#1e293b" stroke-width="1.6" marker-start="url(#diamond)"/>
    <text x="380" y="904">Composicao (ciclo de vida dependente)</text>

    <line x1="700" y1="900" x2="750" y2="900" stroke="#94a3b8" stroke-width="1.3" stroke-dasharray="5,4" marker-end="url(#openarrow)"/>
    <text x="760" y="904">Dependencia (usa um enum)</text>

    <rect x="60" y="930" width="16" height="16" rx="3" fill="#eef8f1" stroke="#2f7d52" stroke-width="1.4"/>
    <text x="84" y="943">Lado Jogador</text>

    <rect x="220" y="930" width="16" height="16" rx="3" fill="#f6f1fb" stroke="#6b3fa0" stroke-width="1.4"/>
    <text x="244" y="943">Lado Mestre</text>

    <rect x="380" y="930" width="16" height="16" rx="3" fill="#fdf8ec" stroke="#b8860b" stroke-width="1.4"/>
    <text x="404" y="943">Enumeracao</text>

    <rect x="540" y="930" width="16" height="16" rx="3" fill="#ffffff" stroke="#334155" stroke-width="1.4"/>
    <text x="564" y="943">Classe abstrata</text>
  </g>

  <text x="670" y="990" text-anchor="middle" font-size="11" fill="#94a3b8">RPG Master — Sistema de apoio a mesas de RPG com IA Generativa (Mistral AI) · TCC</text>
</svg>

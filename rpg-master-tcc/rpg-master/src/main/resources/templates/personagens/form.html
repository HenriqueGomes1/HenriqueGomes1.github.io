<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo Personagem · RPG Master</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="pagina-verde">
<div class="pagina">

    <a class="voltar-link" th:href="@{/personagens}">&larr; Voltar para Personagens</a>

    <div class="topo-pagina">
        <h1 class="titulo-display">Novo Personagem</h1>
    </div>

    <form class="card-vidro" style="max-width: 720px;" th:action="@{/personagens}" th:object="${personagem}" method="post">

        <div class="form-grid">
            <div>
                <label for="nome">Nome</label>
                <input type="text" id="nome" th:field="*{nome}" required maxlength="100" placeholder="Ex: Lyra Ventoeste">
            </div>

            <div>
                <label for="classe">Classe</label>
                <select id="classe" th:field="*{classe}">
                    <option th:each="c : ${classes}" th:value="${c}" th:text="${c.nomeExibicao}">Classe</option>
                </select>
            </div>

            <div>
                <label for="nivel">Nível</label>
                <input type="number" id="nivel" th:field="*{nivel}" min="1" max="20" value="1">
            </div>

            <div>
                <label for="campanhaId">Campanha (opcional)</label>
                <select id="campanhaId" name="campanhaId">
                    <option value="">Nenhuma</option>
                    <option th:each="camp : ${campanhas}" th:value="${camp.id}" th:text="${camp.nome}">Campanha</option>
                </select>
            </div>

            <div class="campo-largo">
                <label>Atributos</label>
                <div class="campo-atributos">
                    <div>
                        <label for="forca">Força</label>
                        <input type="number" id="forca" th:field="*{forca}" min="1" max="20" value="10">
                    </div>
                    <div>
                        <label for="destreza">Destreza</label>
                        <input type="number" id="destreza" th:field="*{destreza}" min="1" max="20" value="10">
                    </div>
                    <div>
                        <label for="constituicao">Constituição</label>
                        <input type="number" id="constituicao" th:field="*{constituicao}" min="1" max="20" value="10">
                    </div>
                    <div>
                        <label for="inteligencia">Inteligência</label>
                        <input type="number" id="inteligencia" th:field="*{inteligencia}" min="1" max="20" value="10">
                    </div>
                    <div>
                        <label for="sabedoria">Sabedoria</label>
                        <input type="number" id="sabedoria" th:field="*{sabedoria}" min="1" max="20" value="10">
                    </div>
                    <div>
                        <label for="carisma">Carisma</label>
                        <input type="number" id="carisma" th:field="*{carisma}" min="1" max="20" value="10">
                    </div>
                </div>
            </div>
        </div>

        <p class="aviso-ia">
            ✨ Ao salvar, a IA Generativa (Mistral) vai escrever a descrição do personagem e
            sugerir automaticamente sua primeira habilidade, com base na classe e nos atributos acima.
        </p>

        <div class="acoes-form">
            <button type="submit" class="botao botao-verde">Criar Personagem com IA</button>
            <a class="botao botao-secundario" th:href="@{/personagens}">Cancelar</a>
        </div>
    </form>

</div>
</body>
</html>

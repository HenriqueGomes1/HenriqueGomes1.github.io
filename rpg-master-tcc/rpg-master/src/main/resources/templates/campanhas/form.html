<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Campanha · RPG Master</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="pagina-roxo">
<div class="pagina">

    <a class="voltar-link" th:href="@{/campanhas}">&larr; Voltar para Campanhas</a>

    <div class="topo-pagina">
        <h1 class="titulo-display">Nova Campanha</h1>
    </div>

    <form class="card-vidro" style="max-width: 620px;" th:action="@{/campanhas}" th:object="${campanha}" method="post">

        <div class="form-grid">
            <div class="campo-largo">
                <label for="nome">Nome da Campanha</label>
                <input type="text" id="nome" th:field="*{nome}" required maxlength="120" placeholder="Ex: A Sombra de Eldoria">
            </div>

            <div class="campo-largo">
                <label for="mestre">Nome do Mestre</label>
                <input type="text" id="mestre" th:field="*{mestre}" required maxlength="100" placeholder="Seu nome">
            </div>

            <div class="campo-largo">
                <label for="descricao">Descrição / Contexto da Campanha</label>
                <textarea id="descricao" th:field="*{descricao}" placeholder="Um breve resumo do cenário, tom da aventura, etc. Esse contexto também é usado pela IA ao gerar NPCs."></textarea>
            </div>
        </div>

        <div class="acoes-form">
            <button type="submit" class="botao botao-roxo">Criar Campanha</button>
            <a class="botao botao-secundario" th:href="@{/campanhas}">Cancelar</a>
        </div>
    </form>

</div>
</body>
</html>

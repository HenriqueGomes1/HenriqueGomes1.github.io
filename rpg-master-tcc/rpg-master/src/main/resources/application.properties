# ===================== Aplicacao =====================
spring.application.name=rpg-master
server.port=8080

# ===================== Banco H2 (em memoria) =====================
spring.datasource.url=jdbc:h2:mem:rpgmaster;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Console web do H2: http://localhost:8080/h2-console
# JDBC URL para conectar: jdbc:h2:mem:rpgmaster
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ===================== Thymeleaf =====================
spring.thymeleaf.cache=false

# ===================== IA Generativa (Mistral AI) =====================
# IMPORTANTE: nunca commitar a chave real. Configure via variavel de ambiente:
#   export MISTRAL_API_KEY=sua_chave_aqui   (Linux/Mac)
#   setx MISTRAL_API_KEY "sua_chave_aqui"   (Windows)
mistral.api.key=${MISTRAL_API_KEY:}
mistral.api.url=https://api.mistral.ai/v1/chat/completions
mistral.api.model=mistral-small-latest

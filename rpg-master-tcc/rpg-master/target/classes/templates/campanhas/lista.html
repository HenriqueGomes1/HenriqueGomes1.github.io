<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campanhas · RPG Master</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="pagina-roxo">
<div class="pagina">

    <a class="voltar-link" th:href="@{/}">&larr; Voltar para a tela inicial</a>

    <div class="topo-pagina">
        <div>
            <h1 class="titulo-display">Campanhas</h1>
            <p>Suas mesas como Mestre, com personagens e NPCs gerados por IA.</p>
        </div>
        <a class="botao botao-roxo" th:href="@{/campanhas/nova}">+ Nova Campanha</a>
    </div>

    <div class="grid-cards">

        <div class="card-vidro card-vazio" th:if="${#lists.isEmpty(campanhas)}">
            <p>Nenhuma campanha criada ainda. Comece criando o mundo da sua mesa.</p>
        </div>

        <div class="card-vidro" th:each="c : ${campanhas}">
            <h3 th:text="${c.nome}">Nome da Campanha</h3>
            <p class="ficha-descricao" th:text="${c.descricao}">Descrição da campanha.</p>
            <p style="font-size: 0.85rem;">
                <strong th:text="${c.mestre}">Mestre</strong> ·
                <span th:text="${c.totalPersonagens} + ' personagens'">0 personagens</span> ·
                <span th:text="${c.totalNpcs} + ' NPCs'">0 NPCs</span>
            </p>
            <div class="ficha-rodape">
                <a class="botao botao-secundario" th:href="@{/campanhas/{id}(id=${c.id})}">Abrir campanha</a>
                <form th:action="@{/campanhas/{id}/excluir(id=${c.id})}" method="post" onsubmit="return confirm('Excluir esta campanha?');">
                    <button type="submit" class="botao botao-perigo">Excluir</button>
                </form>
            </div>
        </div>

    </div>
</div>
</body>
</html>

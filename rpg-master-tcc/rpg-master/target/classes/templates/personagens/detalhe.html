<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${personagem.nome} + ' · RPG Master'">Ficha · RPG Master</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="pagina-verde">
<div class="pagina">

    <a class="voltar-link" th:href="@{/personagens}">&larr; Voltar para Personagens</a>

    <div class="topo-pagina">
        <div>
            <h1 class="titulo-display" th:text="${personagem.nome}">Nome</h1>
            <span class="ficha-classe" th:text="${personagem.classe != null ? personagem.classe.nomeExibicao : 'Sem classe'}">Classe</span>
            <span class="ficha-nivel" th:text="' · Nível ' + ${personagem.nivel}"> · Nível 1</span>
        </div>
    </div>

    <div class="card-vidro" style="max-width: 720px;">
        <p class="ficha-descricao" th:text="${personagem.descricao}">Descrição gerada pela IA.</p>

        <div class="stat-grid">
            <div class="stat-bloco">
                <span class="stat-label">Força</span>
                <span class="stat-valor" th:text="${personagem.forca}">10</span>
                <span class="stat-bonus" th:text="${(personagem.bonusForca >= 0 ? '+' : '') + personagem.bonusForca}">+0</span>
            </div>
            <div class="stat-bloco">
                <span class="stat-label">Destreza</span>
                <span class="stat-valor" th:text="${personagem.destreza}">10</span>
                <span class="stat-bonus" th:text="${(personagem.bonusDestreza >= 0 ? '+' : '') + personagem.bonusDestreza}">+0</span>
            </div>
            <div class="stat-bloco">
                <span class="stat-label">Constituição</span>
                <span class="stat-valor" th:text="${personagem.constituicao}">10</span>
                <span class="stat-bonus" th:text="${(personagem.bonusConstituicao >= 0 ? '+' : '') + personagem.bonusConstituicao}">+0</span>
            </div>
            <div class="stat-bloco">
                <span class="stat-label">Inteligência</span>
                <span class="stat-valor" th:text="${personagem.inteligencia}">10</span>
                <span class="stat-bonus" th:text="${(personagem.bonusInteligencia >= 0 ? '+' : '') + personagem.bonusInteligencia}">+0</span>
            </div>
            <div class="stat-bloco">
                <span class="stat-label">Sabedoria</span>
                <span class="stat-valor" th:text="${personagem.sabedoria}">10</span>
                <span class="stat-bonus" th:text="${(personagem.bonusSabedoria >= 0 ? '+' : '') + personagem.bonusSabedoria}">+0</span>
            </div>
            <div class="stat-bloco">
                <span class="stat-label">Carisma</span>
                <span class="stat-valor" th:text="${personagem.carisma}">10</span>
                <span class="stat-bonus" th:text="${(personagem.bonusCarisma >= 0 ? '+' : '') + personagem.bonusCarisma}">+0</span>
            </div>
        </div>

        <h3>Habilidades</h3>
        <div th:if="${#lists.isEmpty(personagem.habilidades)}">
            <p>Nenhuma habilidade registrada.</p>
        </div>
        <div th:each="h : ${personagem.habilidades}" class="habilidade-item">
            <strong th:text="${h.nome}">Habilidade</strong> —
            <span th:text="${h.descricao}">Descrição</span><br>
            <span class="tag-efeito" th:text="'Atributo: ' + ${h.atributoChave?.nomeExibicao} + ' · Efeito: ' + ${h.tipoEfeito}">Atributo · Efeito</span>
        </div>

        <div class="ficha-rodape">
            <form th:action="@{/personagens/{id}/excluir(id=${personagem.id})}" method="post" onsubmit="return confirm('Excluir este personagem?');">
                <button type="submit" class="botao botao-perigo">Excluir Personagem</button>
            </form>
        </div>
    </div>

</div>
</body>
</html>

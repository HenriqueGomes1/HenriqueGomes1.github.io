<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimório — Organizador de RPG</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ======================= HOME ======================= -->
<section id="view-home" class="view active">
  <button type="button" class="half half-player" id="btn-player">
    <div class="half-inner">
      <span class="half-rune">⚔</span>
      <h2 class="half-title">Jogador</h2>
      <p class="half-sub">Monte sua ficha de personagem</p>
    </div>
  </button>

  <button type="button" class="half half-master" id="btn-master">
    <div class="half-inner">
      <span class="half-rune">☾</span>
      <h2 class="half-title">Mestre</h2>
      <p class="half-sub">Crie NPCs e monstros</p>
    </div>
  </button>
</section>

<!-- ======================= PLAYER (placeholder) ======================= -->
<section id="view-player" class="view">
  <header class="app-header header-player">
    <button type="button" class="btn-back" id="btn-back-player">← Voltar</button>
    <h1>Área do Jogador</h1>
  </header>
  <div class="placeholder-body">
    <p>A ficha de personagem entra aqui no próximo passo.</p>
  </div>
</section>

<!-- ======================= MASTER (placeholder) ======================= -->
<section id="view-master" class="view">
  <header class="app-header header-master">
    <button type="button" class="btn-back" id="btn-back-master">← Voltar</button>
    <h1>Área do Mestre</h1>
  </header>
  <div class="placeholder-body">
    <p>A criação de NPCs e monstros entra aqui no próximo passo.</p>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>

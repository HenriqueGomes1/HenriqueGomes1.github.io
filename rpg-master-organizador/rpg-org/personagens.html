<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Personagens · RPG Master</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="pagina-verde">
<div class="pagina">

  <a class="voltar-link" href="index.html">&larr; Tela inicial</a>

  <div class="topo-pagina">
    <div>
      <h1 class="titulo-display">Personagens</h1>
      <p>Fichas dos aventureiros com atributos D&amp;D 5.5.</p>
    </div>
    <a class="botao botao-verde" href="personagem-form.html">+ Novo Personagem</a>
  </div>

  <div class="grid-cards" id="grid"></div>

</div>
<script src="js/storage.js"></script>
<script src="js/app.js"></script>
<script>
  function render() {
    const grid = document.getElementById('grid');
    const lista = listarPersonagens();

    if (!lista.length) {
      grid.innerHTML = `<div class="card-vidro card-vazio">
        <p>Nenhum personagem criado ainda.</p>
        <a class="botao botao-verde" href="personagem-form.html" style="margin-top:1rem;display:inline-block">
          Criar o primeiro
        </a></div>`;
      return;
    }

    grid.innerHTML = lista.map(p => {
      const habs = (p.habilidades||[]).map(h => `
        <div class="habilidade-item">
          <strong>${h.nome}</strong> — ${h.descricao}<br>
          <span class="tag-efeito">${ATRIBUTOS_EXIBICAO[h.atributoChave]||h.atributoChave} · ${h.tipoEfeito}</span>
        </div>`).join('');
      return `<div class="card-vidro">
        <div class="ficha-cabecalho">
          <div>
            <h3>${p.nome}</h3>
            <span class="ficha-classe">${CLASSES_RPG[p.classe]||p.classe||'—'}</span>
          </div>
          <span class="ficha-nivel">Nível ${p.nivel}</span>
        </div>
        <p class="ficha-descricao">${p.descricao||''}</p>
        ${htmlStatGrid(p,'var(--verde-glow)')}
        ${habs}
        <div class="ficha-rodape">
          <a class="botao botao-secundario botao-sm" href="personagem-detalhe.html?id=${p.id}">Ver ficha</a>
          <a class="botao botao-sm" href="personagem-form.html?id=${p.id}">Editar</a>
          <button class="botao botao-perigo botao-sm" onclick="del('${p.id}')">Excluir</button>
        </div></div>`;
    }).join('');
  }

  function del(id) {
    if (!confirmar('Excluir este personagem?')) return;
    excluirPersonagem(id);
    render();
    toast('Personagem excluído.','info');
  }

  render();
</script>
</body>
</html>
